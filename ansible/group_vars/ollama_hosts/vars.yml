---
# Ollama
ollama_model_default: qwen2.5:3b
ollama_models_extra: []
ollama_num_parallel: "1"
ollama_max_loaded_models: "2"
ollama_flash_attention: "1"
ollama_keep_alive: 10m
ollama_host: "0.0.0.0:11434"

# NVIDIA — RTX 3060
# Must match the host kernel module version (595.71.05)
nvidia_driver_version: "595"

# Open WebUI
open_webui_port: 3000
open_webui_image: "ghcr.io/open-webui/open-webui:main"
open_webui_ollama_url: "http://192.168.2.202:11434"
vault_webui_secret_key: "changeme-replace-with-secure-key"
vault_webui_admin_email: "admin@local"
vault_webui_admin_username: "admin"
vault_webui_admin_password: "changeme"

# AnythingLLM
anything_llm_port: 3001
anything_llm_image: "mintplexlabs/anythingllm:latest"
anything_llm_ollama_url: "http://192.168.2.202:11434"
